version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: deuceverify
      POSTGRES_PASSWORD: deuceverify123
      POSTGRES_DB: deuceverify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://deuceverify:deuceverify123@db:5432/deuceverify
    ports:
      - "5000:5000"
    env_file:
      - .env

volumes:
  postgres_data:
